<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Golden Era Explorer | IMDb Top 1000</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    
    <style>
        :root {
            --bg-color: #fdfcf7;
            --card-bg: #ffffff;
            --pastel-peach: #FFD1BA;
            --pastel-mint: #B2F2BB;
            --pastel-blue: #BAE1FF;
            --text-dark: #2d2d2d;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 40px;
            color: var(--text-dark);
        }

        .header-section { max-width: 950px; margin: 0 auto 60px auto; text-align: center; }
        .title-wrapper { display: inline-block; position: relative; cursor: pointer; }
        h1 { font-family: 'Bebas Neue', cursive; font-size: 5.5rem; letter-spacing: 4px; margin: 0; line-height: 1; }
        
        .clapper-icon {
            position: absolute; top: -30px; right: -60px; font-size: 3rem;
            opacity: 0; transform: rotate(-25deg) scale(0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .title-wrapper:hover .clapper-icon { opacity: 1; transform: rotate(0deg) scale(1); }

        .dashboard-container {
            max-width: 1200px; margin: 0 auto;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px;
        }

        .kpi-card {
            background: var(--card-bg); padding: 30px; border-radius: 20px;
            text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.03);
            border-bottom: 8px solid #eee;
        }

        .kpi-value { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; }
        .kpi-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: #aaa; font-weight: 600; }

        .chart-large {
            grid-column: span 4; background: var(--card-bg);
            padding: 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.03);
        }

        /* Heatmap Styles */
        .heatmap-container { overflow-x: auto; margin-top: 20px; }
        .heatmap {
            display: grid;
            grid-template-columns: 150px repeat(11, 1fr); /* 1 Genre + 11 Decades */
            gap: 5px; min-width: 900px;
        }
        .heat-cell {
            aspect-ratio: 1; border-radius: 6px; background: #f9f9f9;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 600; color: rgba(0,0,0,0.5);
        }
        .label-cell { font-size: 0.8rem; font-weight: 600; color: #777; display: flex; align-items: center; }

        /* Loading State */
        #status-message {
            text-align: center; grid-column: span 4; padding: 20px;
            font-weight: 600; color: #e67e22;
        }
    </style>
</head>
<body>

<div class="header-section">
    <div class="title-wrapper">
        <h1>The Golden Era Explorer</h1>
        <i class="fa-solid fa-clapperboard clapper-icon"></i>
    </div>
    <p style="margin-top:20px; color:#666;">Popcorn ready? Let's analyze the 1,000 greatest films ever made. ✨</p>
</div>

<div class="dashboard-container">
    <div id="status-message">🎬 Pre-production: Loading your data...</div>

    <div class="kpi-card" style="border-color: var(--pastel-peach);">
        <span class="kpi-value">7.95</span>
        <span class="kpi-label">Avg Rating</span>
    </div>
    <div class="kpi-card" style="border-color: var(--pastel-mint);">
        <span class="kpi-value">273.7M</span>
        <span class="kpi-label">Total Votes</span>
    </div>
    <div class="kpi-card" style="border-color: var(--pastel-blue);">
        <span class="kpi-value">Drama</span>
        <span class="kpi-label">Top Genre</span>
    </div>
    <div class="kpi-card" style="border-color: var(--pastel-lilac);">
        <span class="kpi-value">2010s</span>
        <span class="kpi-label">Peak Era</span>
    </div>

    <div class="chart-large">
        <h3>Decade vs. Genre Production</h3>
        <div class="heatmap-container">
            <div id="dynamicHeatmap" class="heatmap"></div>
        </div>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTDvnBokaAQLilxc2sIHSpUQxer__F6VoPhRS9OUM5D_P1OM5oTQsQvQutTzNxPxMulXvxV3rtwdmWE/pub?gid=118353248&single=true&output=csv';

    function init() {
        console.log("Starting Data Fetch...");
        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                console.log("Data Received:", results.data);
                if (results.data.length > 0) {
                    document.getElementById('status-message').style.display = 'none';
                    renderHeatmap(results.data);
                } else {
                    document.getElementById('status-message').innerText = "❌ Error: The sheet returned no data.";
                }
            },
            error: function(err) {
                console.error("PapaParse Error:", err);
                document.getElementById('status-message').innerText = "❌ Error: Could not connect to Google Sheets.";
            }
        });
    }

    function renderHeatmap(data) {
        const container = document.getElementById('dynamicHeatmap');
        const decades = ['1920', '1930', '1940', '1950', '1960', '1970', '1980', '1990', '2000', '2010', '2020'];

        // 1. Add Header
        let html = '<div class="label-cell">GENRE</div>';
        decades.forEach(d => html += `<div class="label-cell">${d}s</div>`);

        // 2. Add Rows
        data.forEach(row => {
            // Find the genre name (it might be under different header names depending on the pivot)
            const genre = row['Primary_Genre'] || row[''] || Object.values(row)[0];
            
            if (!genre || genre.includes('Total')) return; // Skip totals

            html += `<div class="label-cell">${genre}</div>`;
            
            decades.forEach(d => {
                const count = parseInt(row[d]) || 0;
                // Calculate pastel green intensity
                const opacity = Math.min(count / 40, 1);
                const bgColor = count > 0 ? `rgba(178, 242, 187, ${opacity + 0.1})` : '#fdfdfd';
                
                html += `<div class="heat-cell" style="background: ${bgColor}">${count > 0 ? count : ''}</div>`;
            });
        });

        container.innerHTML = html;
    }

    // Run on load
    window.onload = init;
</script>

</body>
</html>
